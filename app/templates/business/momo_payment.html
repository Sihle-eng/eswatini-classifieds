{% extends "base.html" %}

{% block title %}MTN MoMo Payment - Eswatini Classifieds{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h2 class="text-2xl font-bold mb-6">📱 Pay with MTN Mobile Money</h2>
    
    <div class="bg-white rounded-lg shadow p-6 mb-6">
        <div class="mb-6">
            <h3 class="text-lg font-semibold mb-2">Ad Details</h3>
            <p><strong>Title:</strong> {{ posting.title }}</p>
            <p><strong>Amount:</strong> SZL {{ "%.2f"|format(transaction.amount) }}</p>
        </div>
        
        <form method="POST" action="{{ url_for('main.pay_with_momo', posting_id=posting.id) }}">
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">MTN Mobile Number *</label>
                <input type="tel" name="phone_number" required 
                       placeholder="268 7XXX XXXX"
                       class="w-full px-3 py-2 border rounded-lg">
            </div>
            
            <button type="submit" 
                    class="w-full bg-yellow-500 text-gray-900 py-3 rounded-lg font-semibold hover:bg-yellow-600">
                📱 Pay SZL {{ "%.2f"|format(transaction.amount) }}
            </button>
        </form>
    </div>
</div>
{% endblock %}
