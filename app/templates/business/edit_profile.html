{% extends "base.html" %}

{% block title %}Edit Business Profile - Eswatini Classifieds{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h2 class="text-2xl font-bold mb-6"><i class="fas fa-building text-blue-600 mr-2"></i> Edit Business Profile</h2>
    
    <form method="POST" action="{{ url_for('main.edit_business_profile') }}" class="bg-white rounded-lg shadow p-6">
        
        <!-- Company Name -->
        <div class="mb-4">
            <label class="block text-gray-700 mb-2 font-medium">Company Name *</label>
            <input type="text" name="company_name" required 
                   value="{{ profile.company_name if profile else '' }}"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
        </div>
        
        <!-- Registration Number -->
        <div class="mb-4">
            <label class="block text-gray-700 mb-2 font-medium">Business Registration Number</label>
            <input type="text" name="registration_number" 
                   value="{{ profile.registration_number if profile else '' }}"
                   placeholder="Eswatini Business Reg Number"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
        </div>
        
        <!-- Phone Number -->
        <div class="mb-4">
            <label class="block text-gray-700 mb-2 font-medium">Phone Number *</label>
            <input type="tel" name="phone_number" required 
                   value="{{ profile.phone_number if profile else '' }}"
                   placeholder="+268 7XXX XXXX"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
        </div>
        
        <!-- City -->
        <div class="mb-4">
            <label class="block text-gray-700 mb-2 font-medium">City *</label>
            <select name="city" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                <option value="">-- Select City --</option>
                {% set cities = ['Mbabane', 'Manzini', 'Matsapha', 'Ezulwini', 'Nhlangano', 'Siteki', 'Big Bend', 'Mhlume', 'Piggs Peak'] %}
                {% for city in cities %}
                <option value="{{ city }}" {{ 'selected' if profile and profile.city == city else '' }}>{{ city }}</option>
                {% endfor %}
            </select>
        </div>
        
        <!-- Address -->
        <div class="mb-6">
            <label class="block text-gray-700 mb-2 font-medium">Physical Address</label>
            <textarea name="address" rows="3" 
                      placeholder="Street address, building name, etc."
                      class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">{{ profile.address if profile else '' }}</textarea>
        </div>
        
        <!-- Submit -->
        <div class="flex gap-3">
            <button type="submit" 
                    class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
                Save Profile
            </button>
            <a href="{{ url_for('main.business_dashboard') }}" 
               class="px-6 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
