{% extends "base.html" %}
{% block title %}Feedback - Eswatini Classifieds{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-lg shadow p-6 mt-8">
    <h2 class="text-2xl font-bold mb-4"><i class="fas fa-comment-dots mr-2"></i>Share Your Feedback</h2>
    <form method="POST">
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">How satisfied are you?</label>
            <select name="satisfaction" class="w-full px-3 py-2 border rounded-lg">
                <option value="">-- Select --</option>
                <option>Very Satisfied</option>
                <option>Satisfied</option>
                <option>Neutral</option>
                <option>Dissatisfied</option>
                <option>Very Dissatisfied</option>
            </select>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Suggestions</label>
            <textarea name="suggestions" rows="4" class="w-full px-3 py-2 border rounded-lg"
                placeholder="Tell us how we can improve..."></textarea>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">Submit
            Feedback</button>
    </form>
</div>
{% endblock %}
