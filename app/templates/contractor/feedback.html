{% extends "base.html" %}
{% block title %}Feedback Forms - Eswatini Classifieds{% endblock %}
{% block content %}
<h2 class="text-2xl font-bold mb-4"><i class="fas fa-poll mr-2"></i>Feedback Form</h2>
<div class="max-w-lg bg-white rounded-lg shadow p-6">
    <form method="POST">
        <div class="mb-3"><label class="block text-sm">How satisfied are you with our platform?</label>
            <select name="satisfaction" class="w-full px-3 py-2 border rounded-lg">
                <option>Very Satisfied</option>
                <option>Satisfied</option>
                <option>Neutral</option>
                <option>Dissatisfied</option>
            </select>
        </div>
        <div class="mb-3"><label class="block text-sm">Suggestions</label><textarea name="suggestions" rows="3"
                class="w-full px-3 py-2 border rounded-lg"></textarea></div>
        <button type="submit" class="bg-purple-600 text-white px-4 py-2 rounded-lg">Submit Feedback</button>
    </form>
</div>
{% endblock %}
