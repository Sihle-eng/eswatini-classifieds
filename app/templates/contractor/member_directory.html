{% extends "base.html" %}
{% block title %}Member Directory - Eswatini Classifieds{% endblock %}
{% block content %}
<h2 class="text-2xl font-bold mb-4"><i class="fas fa-address-book mr-2"></i>Member Directory</h2>
<div class="bg-white rounded-lg shadow overflow-x-auto">
    <table class="w-full min-w-[600px]">
        <thead class="bg-gray-100 border-b">
            <tr>
                <th class="px-4 py-3 text-left text-sm">Email</th>
                <th class="px-4 py-3 text-left text-sm">Type</th>
                <th class="px-4 py-3 text-left text-sm">Joined</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr class="border-b hover:bg-gray-50">
                <td class="px-4 py-3 text-sm">{{ user.email }}</td>
                <td class="px-4 py-3 text-sm">{{ user.user_type }}</td>
                <td class="px-4 py-3 text-sm">{{ user.created_at.strftime('%d %b %Y') }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
