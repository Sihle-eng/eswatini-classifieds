{% extends "base.html" %}
{% block title %}Email Automation{% endblock %}
{% block content %}
<h2 class="text-2xl font-bold mb-4"><i class="fas fa-envelope-open-text mr-2"></i>Email Automation</h2>
<div class="bg-white rounded-lg shadow p-6">
    <form method="POST">
        <div class="mb-3"><label class="block text-sm">Subject</label><input type="text" name="subject"
                class="w-full px-3 py-2 border rounded-lg" required></div>
        <div class="mb-3"><label class="block text-sm">Message</label><textarea name="body" rows="4"
                class="w-full px-3 py-2 border rounded-lg" required></textarea></div>
        <div class="mb-3"><label class="block text-sm">Recipients (select leads)</label>
            <div class="max-h-40 overflow-y-auto border rounded-lg p-2">
                {% for lead in leads %}
                <label class="flex items-center gap-2"><input type="checkbox" name="recipients" value="{{ lead.id }}">
                    {{ lead.name }} ({{ lead.email }})</label>
                {% endfor %}
            </div>
        </div>
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Send Emails</button>
    </form>
</div>
{% endblock %}
