{% extends "base.html" %}
{% block title %}Content Hub{% endblock %}
{% block content %}
<h2 class="text-2xl font-bold mb-4"><i class="fas fa-blog mr-2"></i>Content Hub</h2>

<!-- Create Post Form -->
<div class="mb-6 bg-white rounded-lg shadow p-6">
    <form method="POST">
        <input type="text" name="title" class="w-full px-3 py-2 border rounded-lg mb-3" placeholder="Blog post title"
            required>
        <textarea name="content" rows="6" class="w-full px-3 py-2 border rounded-lg mb-3"
            placeholder="Write your article..." required></textarea>
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Publish</button>
    </form>
</div>

<!-- Posts List (only one loop) -->
{% for post in posts %}
<div class="bg-white rounded-lg shadow p-4 mb-3">
    <div class="flex justify-between items-center">
        <div>
            <h3 class="text-lg font-semibold">{{ post.title }}</h3>
            <p class="text-sm text-gray-500">{{ post.created_at.strftime('%d %b %Y') }} by {{ post.author.email }}</p>
        </div>
        <div class="flex items-center gap-2">
            <a href="{{ url_for('main.edit_blog_post', post_id=post.id) }}"
                class="text-blue-600 hover:underline text-sm px-2 py-1">Edit</a>
            <form method="POST" action="{{ url_for('main.delete_blog_post', post_id=post.id) }}"
                onsubmit="return confirm('Delete this post?');" class="inline">
                <button type="submit"
                    class="text-red-600 hover:underline text-sm px-2 py-1 bg-transparent border-none cursor-pointer">
                    Delete
                </button>
            </form>
        </div>
    </div>
    <p class="mt-2">{{ post.content[:200] }}...</p>
</div>
{% endfor %}
{% endblock %}
