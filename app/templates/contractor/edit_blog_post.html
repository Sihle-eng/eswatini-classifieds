{% extends "base.html" %}
{% block title %}Edit Blog Post{% endblock %}
{% block content %}
<h2 class="text-2xl font-bold mb-4">Edit Post</h2>
<form method="POST" class="bg-white rounded-lg shadow p-6">
    <div class="mb-3">
        <label class="block text-sm">Title</label>
        <input type="text" name="title" value="{{ post.title }}" class="w-full px-3 py-2 border rounded-lg" required>
    </div>
    <div class="mb-3">
        <label class="block text-sm">Content</label>
        <textarea name="content" rows="8" class="w-full px-3 py-2 border rounded-lg"
            required>{{ post.content }}</textarea>
    </div>
    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg">Update</button>
    <a href="{{ url_for('main.contractor_content_hub') }}" class="ml-2 text-gray-600">Cancel</a>
</form>
{% endblock %}
