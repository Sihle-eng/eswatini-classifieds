<!DOCTYPE html>
<html>

<head>
    <title>New Contact Enquiry</title>
</head>

<body>
    <h2>New enquiry from {{ name }}</h2>
    <p><strong>Email:</strong> {{ email }}</p>
    <p><strong>Subject:</strong> {{ subject_text }}</p>
    <p><strong>Message:</strong></p>
    <p>{{ message }}</p>
    <p><small>Inquiry ID: {{ inquiry_id }}</small></p>
</body>

</html>
