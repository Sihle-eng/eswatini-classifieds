<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Eswatini Flag Colors -->
  <rect width="100" height="20" fill="#3A75C4"/>
  <rect y="20" width="100" height="5" fill="#FFD100"/>
  <rect y="25" width="100" height="20" fill="#3A75C4"/>
  <rect y="45" width="100" height="5" fill="#FFD100"/>
  <rect y="50" width="100" height="20" fill="#3A75C4"/>
  <rect y="70" width="100" height="5" fill="#FFD100"/>
  <rect y="75" width="100" height="25" fill="#3A75C4"/>
  
  <!-- White Shield Background -->
  <rect x="25" y="15" width="50" height="55" rx="5" fill="white" opacity="0.9"/>
  
  <!-- Blue Shield Border -->
  <rect x="27" y="17" width="46" height="51" rx="4" fill="none" stroke="#3A75C4" stroke-width="2"/>
  
  <!-- Classifieds Symbol - Document/Magnifying Glass -->
  <rect x="38" y="30" width="24" height="18" rx="2" fill="#3A75C4" opacity="0.8"/>
  <line x1="42" y1="35" x2="58" y2="35" stroke="white" stroke-width="2"/>
  <line x1="42" y1="40" x2="58" y2="40" stroke="white" stroke-width="2"/>
  <line x1="42" y1="45" x2="52" y2="45" stroke="white" stroke-width="2"/>
  
  <!-- Magnifying Glass -->
  <circle cx="55" cy="55" r="8" fill="none" stroke="#FFD100" stroke-width="3"/>
  <line x1="61" y1="61" x2="68" y2="68" stroke="#FFD100" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Small Star -->
  <polygon points="50,12 52,18 58,18 53,22 55,28 50,24 45,28 47,22 42,18 48,18" fill="#FFD100"/>
</svg>